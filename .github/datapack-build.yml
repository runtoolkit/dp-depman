name: Datapack Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      mode:
        description: "Dependency resolution mode"
        required: true
        default: "prod"
        type: choice
        options: [prod, dev, auto]
      publish:
        description: "Publish after build"
        required: true
        default: "none"
        type: choice
        options: [none, modrinth, curseforge, all]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DEFAULT_MODE:   "prod"

jobs:
  # ─── 1. Dependency check (PRs only, no network) ───────────────────────────
  dep-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check constraints against lock file
        run: python scripts/dp-resolve.py check

  # ─── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    outputs:
      pack-id:      ${{ steps.meta.outputs.pack_id }}
      pack-version: ${{ steps.meta.outputs.pack_version }}
      zip-name:     ${{ steps.meta.outputs.zip_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache .dp-cache
        uses: actions/cache@v4
        with:
          path: .dp-cache
          key: dp-cache-${{ runner.os }}-${{ hashFiles('datapack_depends.lock') }}
          restore-keys: |
            dp-cache-${{ runner.os }}-

      - name: Resolve and build
        env:
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          python scripts/dp-resolve.py build \
            --mode ${{ github.event.inputs.mode || env.DEFAULT_MODE }}

      - name: Read pack metadata
        id: meta
        run: |
          python - << 'PYEOF'
          import json, os, pathlib, sys

          root = pathlib.Path(".")
          mp   = root / ".depends" / "manifest.json"
          data = json.loads(mp.read_text()) if mp.exists() else \
                 json.loads((root / "datapack_depends.json").read_text())

          pack_id  = data["id"]
          pack_ver = data["version"]
          zip_name = f"{pack_id}-{pack_ver}.zip"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"pack_id={pack_id}\n")
              f.write(f"pack_version={pack_ver}\n")
              f.write(f"zip_name={zip_name}\n")

          print(f"Pack: {pack_id} v{pack_ver}  →  dist/{zip_name}")
          PYEOF

      - name: Commit lock file (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datapack_depends.lock
          git diff --cached --quiet || git commit -m "chore: update lock file [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }} || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: datapack-dist-${{ steps.meta.outputs.pack_version }}
          path: dist/${{ steps.meta.outputs.zip_name }}
          retention-days: 30

  # ─── 3. Release (tag push only) ──────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: datapack-dist-${{ needs.build.outputs.pack-version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ needs.build.outputs.pack-id }} ${{ github.ref_name }}"
          body: |
            ## ${{ needs.build.outputs.pack-id }} ${{ github.ref_name }}

            ### Installation

            Drop `${{ needs.build.outputs.zip-name }}` into `world/datapacks/` and run `/reload`.

            Dependency ZIPs are embedded inside the pack under `.depends/` —
            **no separate downloads needed.**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/${{ needs.build.outputs.zip-name }}
          fail_on_unmatched_files: true

  # ─── 4. Publish (tag push or manual with publish != none) ────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish != 'none')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: actions/download-artifact@v4
        with:
          name: datapack-dist-${{ needs.build.outputs.pack-version }}
          path: dist/

      - name: Publish to Modrinth
        if: |
          github.event.inputs.publish == 'modrinth' ||
          github.event.inputs.publish == 'all' ||
          startsWith(github.ref, 'refs/tags/v')
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          python scripts/dp-publish.py modrinth \
            --zip dist/${{ needs.build.outputs.zip-name }}

      - name: Publish to CurseForge
        if: |
          github.event.inputs.publish == 'curseforge' ||
          github.event.inputs.publish == 'all' ||
          startsWith(github.ref, 'refs/tags/v')
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          python scripts/dp-publish.py curseforge \
            --zip dist/${{ needs.build.outputs.zip-name }}
