name: Dependency Update Check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    name: Check for new versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Snapshot current lock file
        run: cp datapack_depends.lock datapack_depends.lock.old 2>/dev/null || true

      - name: Resolve in prod mode (updates lock)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/dp-resolve.py resolve --mode prod

      - name: Check if lock changed
        id: diff
        run: |
          if diff -q datapack_depends.lock.old datapack_depends.lock > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New versions detected:"
            diff datapack_depends.lock.old datapack_depends.lock || true
          fi

      - name: Open PR if changed
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="deps/auto-update-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add datapack_depends.lock
          git commit -m "chore(deps): update lock file ($(date +%Y-%m-%d))"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore(deps): dependency update $(date +%Y-%m-%d)" \
            --body "Scheduled dependency check — lock file updated.

          Review the diff, test locally, then merge." \
            --base main \
            --head "$BRANCH" \
            --label "dependencies"
