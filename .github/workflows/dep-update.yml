name: Dependency Update Check
on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
permissions:
  contents: write
  issues: write
jobs:
  check-updates:
    name: Check for new versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Snapshot current lock file
        run: cp datapack_depends.lock datapack_depends.lock.old 2>/dev/null || true
      # resolve hits GitHub API — token required
      - name: Resolve in prod mode (updates lock)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/dp-resolve.py resolve --mode prod
      - name: Check if lock changed
        id: diff
        run: |
          if diff -q datapack_depends.lock.old datapack_depends.lock > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No dependency changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New versions detected:"
            diff datapack_depends.lock.old datapack_depends.lock || true
          fi
      - name: List updated dependencies
        if: steps.diff.outputs.changed == 'true'
        run: python scripts/dp-resolve.py check
      - name: Push branch and open issue (PR creation blocked by org policy)
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="deps/auto-update-$(date +%Y%m%d)"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add datapack_depends.lock
          git commit -m "chore(deps): update lock file ($(date +%Y-%m-%d))"
          git push origin "$BRANCH" --force

          REPO="${GITHUB_REPOSITORY}"
          COMPARE_URL="https://github.com/${REPO}/compare/main...${BRANCH}?expand=1"
          DIFF_CONTENT=$(diff datapack_depends.lock.old datapack_depends.lock || true)

          gh issue create \
            --title "chore(deps): dependency update $(date +%Y-%m-%d)" \
            --body "Scheduled dependency check — lock file updated on branch \`${BRANCH}\`.

          GitHub Actions cannot open the PR (org policy: \"Allow GitHub Actions to create and approve pull requests\" is disabled). Click the link below to create the PR manually:

          ${COMPARE_URL}

          \`\`\`diff
          ${DIFF_CONTENT}
          \`\`\`

          Review the diff, test locally, then create the PR via the link above." \
            --label "dependencies"
